services:
  mysql:
    image: mysql:8
    container_name: eventbooking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: event_booking_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: eventbooking-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: eventbooking-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VECTOR_DB_NAME:-eventgpt_vectors}
      POSTGRES_USER: ${VECTOR_DB_USERNAME:-eventgpt}
      POSTGRES_PASSWORD: ${VECTOR_DB_PASSWORD:-eventgpt}
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./backend/sql/pgvector_schema.sql:/docker-entrypoint-initdb.d/01_pgvector_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VECTOR_DB_USERNAME:-eventgpt} -d ${VECTOR_DB_NAME:-eventgpt_vectors}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  mongo_data:
  pgvector_data:
